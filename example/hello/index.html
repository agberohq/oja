<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oja · Hello</title>
    <link rel="stylesheet" href="../../build/oja.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
        }

        /* ── Shell nav ───────────────────────────────────────── */
        .shell {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        .shell-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .brand {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #555;
        }

        .nav {
            display: flex;
            gap: 4px;
        }

        .nav a {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }

        .nav a:hover          { background: #1e1e1e; color: #e8e8e8; }
        .nav a.oja-active     { background: #e8e8e8; color: #0f0f0f; font-weight: 600; }

        /* ── Page outlet ─────────────────────────────────────── */
        #app { /* router writes here */ }

        /* ── Counter page ────────────────────────────────────── */
        .card {
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            background: #141414;
            padding: 48px;
            text-align: center;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 32px;
        }

        .count-display {
            font-size: 96px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 24px;
            transition: transform 0.08s ease;
        }

        .count-display.bump { transform: scale(1.12); }

        .progress-track {
            height: 3px;
            background: #1e1e1e;
            border-radius: 2px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #e8e8e8;
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #e8e8e8;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: #222; }

        .btn-primary {
            background: #e8e8e8;
            color: #0f0f0f;
            border-color: #e8e8e8;
            font-weight: 600;
        }
        .btn-primary:hover { background: #ccc; border-color: #ccc; }

        .card-hint {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
            height: 18px;
        }

        /* ── Guestbook page ──────────────────────────────────── */
        .gb-form {
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            background: #141414;
            padding: 32px;
            margin-bottom: 24px;
        }

        .gb-form h2 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 20px;
        }

        .field { margin-bottom: 14px; }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 6px;
        }

        .field input,
        .field textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .field input:focus,
        .field textarea:focus { border-color: #555; }

        .field textarea { resize: vertical; min-height: 80px; }

        .field-error {
            font-size: 11px;
            color: #e05555;
            margin-top: 4px;
            display: block;
        }

        /* ── Entry card ──────────────────────────────────────── */
        .entry {
            display: flex;
            gap: 14px;
            padding: 20px;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            background: #141414;
            margin-bottom: 12px;
        }

        .entry-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            color: #0f0f0f;
        }

        .entry-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .entry-message {
            font-size: 13px;
            color: #999;
            line-height: 1.5;
        }

        .entry-time {
            font-size: 11px;
            color: #444;
            margin-top: 6px;
        }

        #entries-list:empty::after {
            content: 'No entries yet — be the first to sign!';
            display: block;
            text-align: center;
            color: #444;
            font-size: 13px;
            padding: 32px 0;
        }
    </style>
</head>
<body>
<div class="shell">

    <!-- Persistent nav shell — layout.js keeps this across navigations -->
    <header class="shell-header" id="shell-header">
        <span class="brand">Oja · Hello</span>
        <nav class="nav">
            <a href="#/" data-page="/">Counter</a>
            <a href="#/guestbook" data-page="/guestbook">Guestbook</a>
        </nav>
    </header>

    <!-- Router outlet -->
    <div id="app"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
