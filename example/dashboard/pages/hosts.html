<!--
  pages/hosts.html
  Demonstrates: each() with filter/sort/chunk, debounce, Go-style templates,
                data-if-class, data-bind, nested each() after chunk render
-->
<div class="page" data-title="Hosts">
    <div class="page-header">
        <h1>Hosts</h1>
        <div class="header-actions">
            <input id="host-search" type="text" placeholder="Filter hosts..." class="search-input" autocomplete="off">
            <select id="host-sort" class="select-sm">
                <option value="name">Sort: Name</option>
                <option value="reqs">Sort: Requests</option>
                <option value="errors">Sort: Errors</option>
                <option value="p99">Sort: Latency</option>
            </select>
            <label class="toggle-label">
                <input type="checkbox" id="alive-only"> Alive only
            </label>
        </div>
    </div>

    <div id="hostsContainer">
        <div data-loading="hosts" class="loading-row">Loading hosts...</div>
        <div data-empty="hosts"   style="display:none"></div>

        <template data-each="hosts" data-as="h">
            <div class="host-row">
                <div class="host-header">
                    <div class="host-name">
                        <span class="dot" data-if-class="h.alive:dot-green"></span>
                        <strong>{{h.hostname}}</strong>
                        <span class="badge {{if .h.tls}}badge-ok{{else}}badge-no-tls{{end}}">
                            {{if .h.tls}}🔒 {{h.tlsMode}}{{else}}No TLS{{end}}
                        </span>
                        {{if .h.tlsDaysLeft}}
                        <span class="badge {{if .h.tlsExpiring}}badge-warn{{else}}badge-ok{{end}}">
                            {{h.tlsDaysLeft}}d left
                        </span>
                        {{end}}
                    </div>
                    <a data-bind="href:h.detailUrl" class="btn-sm">Detail →</a>
                </div>

                <div class="host-meta muted" style="margin-bottom:8px">
                    {{range .h.domains}}<span class="domain-badge">{{.}}</span> {{end}}
                </div>

                <div class="host-stats" style="display:flex;gap:20px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:12px">
                    <span><strong style="color:var(--fg)">{{h.totalReqs}}</strong> reqs</span>
                    <span><strong style="color:var(--fg)">{{h.errors}}</strong> errors</span>
                    <span><strong style="color:var(--fg)">{{h.p99Ms}}ms</strong> p99</span>
                    <span><strong style="color:var(--fg)">{{h.activeBackends}}</strong> backends</span>
                </div>

                <!-- Routes for this host — filled after chunk render -->
                <div class="routes-for-{{h.id}}">
                    <div data-loading="routes" style="display:none"></div>
                    <template data-each="routes" data-as="route">
                        <div class="route-block">
                            <div class="route-header">
                                <span class="route-path">{{route.path}}</span>
                                <span class="badge">{{route.method}}</span>
                                <span class="muted" style="font-size:11px;font-family:var(--mono)">{{route.backendCount}} backend{{route.backendCount != 1}}s{{end}}</span>
                            </div>
                            <div class="backend-list">
                                <template data-each="backends" data-as="be">
                                    <div class="backend-row {{if .be.alive}}{{else}}down{{end}}">
                                        <span class="dot" data-if-class="be.alive:dot-green"></span>
                                        <span class="be-url">{{be.url}}</span>
                                        <span class="be-stat">{{be.reqs}} reqs</span>
                                        <span class="be-stat">p99: {{be.p99}}ms</span>
                                        <span class="badge {{if .be.alive}}badge-ok{{else}}badge-danger{{end}}">
                                            {{be.healthStatus}}
                                        </span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <div data-empty="routes" class="muted" style="display:none;font-size:12px;padding:8px 0">
                        No routes configured
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<script type="module">
    import { each, fill, on, debounce } from '../../../src/oja.js';
    import { api }          from '../app.js';

    let _allHosts = [];
    const hostsContainer = container.querySelector('#hostsContainer') || document.getElementById('hostsContainer');

    async function loadHosts() {
        _allHosts = await api.get('/api/hosts') || [];
        renderHosts();
    }

    function renderHosts() {
        const searchEl  = container.querySelector('#host-search');
        const sortEl    = container.querySelector('#host-sort');
        const aliveEl   = container.querySelector('#alive-only');

        const search    = searchEl?.value?.toLowerCase() || '';
        const sortBy    = sortEl?.value   || 'name';
        const aliveOnly = aliveEl?.checked || false;

        each(hostsContainer, 'hosts', _allHosts, {
            filter: (h) => {
                if (aliveOnly && !h.alive) return false;
                if (search) return (
                    h.hostname.toLowerCase().includes(search) ||
                    h.domains.some(d => d.toLowerCase().includes(search))
                );
                return true;
            },
            sort: (a, b) => {
                if (sortBy === 'reqs')   return b.totalReqs - a.totalReqs;
                if (sortBy === 'errors') return b.errors - a.errors;
                if (sortBy === 'p99')    return b.p99Ms - a.p99Ms;
                return a.hostname.localeCompare(b.hostname);
            },
            map: (h) => ({
                ...h,
                detailUrl    : `#/hosts/${h.id}`,
                tlsExpiring  : h.tlsDaysLeft && h.tlsDaysLeft < 14,
            }),
            chunk: 3,
            empty: '<div class="empty-state"><div class="empty-icon">🔍</div><p>No hosts match your filters</p></div>',
        });

        // After chunk rendering we need a small delay for the DOM to settle,
        // then wire nested routes into each host row using container scope.
        requestAnimationFrame(() => {
            hostsContainer.querySelectorAll('[data-each-item="hosts"]').forEach(hostEl => {
                const id   = hostEl.querySelector('[data-bind]')?.getAttribute('href')?.split('/').pop();
                const host = _allHosts.find(h => h.id === id || hostEl.textContent.includes(h.hostname));
                if (!host) return;

                const routesSlot = hostEl.querySelector(`[data-each="routes"]`)?.parentElement;
                if (!routesSlot) return;

                each(hostEl, 'routes', host.routes || [], {
                    map: r => ({
                        ...r,
                        backendCount: r.backends?.length || 0,
                    }),
                });

                // Nested backends within each route card
                hostEl.querySelectorAll('[data-each-item="routes"]').forEach((routeEl, ri) => {
                    const route = host.routes?.[ri];
                    if (route) {
                        each(routeEl, 'backends', route.backends || []);
                    }
                });
            });
        });
    }

    // Wire controls using container scope — not document-level
    const searchEl = container.querySelector('#host-search');
    const sortEl   = container.querySelector('#host-sort');
    const aliveEl  = container.querySelector('#alive-only');

    if (searchEl) searchEl.addEventListener('input',  debounce(renderHosts, 200));
    if (sortEl)   sortEl.addEventListener('change',   renderHosts);
    if (aliveEl)  aliveEl.addEventListener('change',  renderHosts);

    await loadHosts();
</script>
