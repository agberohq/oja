<!--
  pages/dashboard.html
  Demonstrates: reactive state/effect/derived, context() global state,
                component.interval(), adapter (SVG chart), each()
-->
<div class="page" data-title="Dashboard">

    <div class="hero">
        <h1 id="hero-title">System Status</h1>
        <p>Monitoring <span id="hero-hosts">0</span> hosts · <span id="hero-routes">0</span> routes</p>
        <div class="health-bar-wrap">
            <div class="health-bar">
                <div class="hb-ok" id="hb-ok"  style="width:100%"></div>
                <div class="hb-err" id="hb-err" style="width:0%"></div>
            </div>
            <div class="health-legend">
                <span>Success</span>
                <span class="error-rate" id="hero-errrate">0% errors</span>
            </div>
        </div>
        <div class="last-updated" id="dash-updated">Updated just now</div>
    </div>

    <!-- Live stat cards -->
    <div class="stat-grid">
        <div class="stat-card">
            <div class="stat-label">Requests / sec</div>
            <div class="stat-value" id="stat-rps">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Requests</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Active Backends</div>
            <div class="stat-value" id="stat-backends">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">p99 Latency</div>
            <div class="stat-value" id="stat-p99">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Error Rate</div>
            <div class="stat-value danger" id="stat-errrate">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">CPU</div>
            <div class="stat-value" id="stat-cpu">—</div>
        </div>
    </div>

    <!-- p99 sparkline chart -->
    <div class="chart-card">
        <div class="chart-header">
            <span>p99 Latency — last 30 polls</span>
            <span id="chart-peak" class="muted"></span>
        </div>
        <div id="p99Chart" style="height:120px"></div>
    </div>

    <!-- Host health summary -->
    <div class="section-header">
        <h2>Host Health</h2>
        <button id="refresh-dash" class="btn-sm">Refresh</button>
    </div>

    <div id="hostHealthList">
        <div data-loading="hosts" class="loading-row">Loading hosts...</div>
        <template data-each="hosts" data-as="h">
            <div class="health-row {{if .h.alive}}alive{{else}}dead{{end}}">
                <span class="dot" data-if-class="h.alive:dot-green"></span>
                <span class="health-name">{{h.hostname}}</span>
                <span class="health-reqs muted">{{h.totalReqs}} reqs</span>
                <span class="health-p99 muted">p99: {{h.p99Ms}}ms</span>
                {{if .h.tls}}
                <span class="badge {{if .h.tlsDaysLeft}}badge-ok{{end}}">
                    TLS {{h.tlsDaysLeft}}d
                </span>
                {{end}}
                <a href="#/hosts/{{h.id}}" class="btn-sm">Detail →</a>
            </div>
        </template>
        <div data-empty="hosts" style="display:none" class="empty-row">No hosts found</div>
    </div>
</div>

<script type="module">
    import { state, effect, derived, batch, context } from '../../src/js/reactive.js';
    import { each }      from '../../src/js/template.js';
    import { adapter }   from '../../src/js/adapter.js';
    import { notify }    from '../../src/js/notify.js';
    import { component } from '../../src/js/component.js';
    import { on }        from '../../src/js/events.js';
    import { api, setRps, setAvgP99, setTotalReqs, setErrors, setActiveBackends } from '../app.js';

    // ── Local state ───────────────────────────────────────────────────────────
    const [metrics,    setMetrics]  = state(null);
    const [p99History, setHistory]  = state([]);

    const errorRate = derived(() => {
        const m = metrics();
        if (!m || !m.totalReqs) return '0.00%';
        return ((m.totalErrors / m.totalReqs) * 100).toFixed(2) + '%';
    });

    // ── Effects — surgical DOM updates ───────────────────────────────────────
    effect(() => {
        const m = metrics();
        if (!m) return;

        const set = (id, v) => { const el = container.querySelector('#' + id) || document.getElementById(id); if (el) el.textContent = v; };

        batch(() => {
            set('stat-rps',      m.rps.toFixed(1) + ' req/s');
            set('stat-total',    _fmt(m.totalReqs));
            set('stat-backends', m.activeBackends);
            set('stat-p99',      m.avgP99Ms + 'ms');
            set('stat-errrate',  errorRate());
            set('stat-cpu',      m.cpuPercent.toFixed(1) + '%');
            set('dash-updated',  'Updated ' + new Date().toLocaleTimeString());
            set('hero-errrate',  errorRate() + ' errors');
        });

        // Health bar
        const total  = m.totalReqs || 1;
        const errPct = Math.min(100, (m.totalErrors / total) * 100);
        const okEl   = document.getElementById('hb-ok');
        const errEl  = document.getElementById('hb-err');
        if (okEl)  okEl.style.width  = (100 - errPct) + '%';
        if (errEl) errEl.style.width = errPct + '%';

        // Push to global context — updates footer stats bar
        setRps(m.rps);
        setAvgP99(m.avgP99Ms);
        setTotalReqs(m.totalReqs);
        setErrors(m.totalErrors);
        setActiveBackends(m.activeBackends);
    });

    effect(() => {
        const hist = p99History();
        if (!hist.length) return;

        const chart = adapter.use('chart');
        chart.draw(
            document.getElementById('p99Chart'),
            hist,
            { color: 'var(--accent)', unit: 'ms', label: 'p99 latency' }
        );

        const peakEl = document.getElementById('chart-peak');
        if (peakEl) peakEl.textContent = 'peak: ' + Math.max(...hist) + 'ms';
    });

    // ── Data fetching ─────────────────────────────────────────────────────────
    async function refresh() {
        const data = await api.get('/api/metrics');
        if (!data) return;
        setMetrics(data);
        setHistory(prev => {
            const next = [...prev, data.avgP99Ms];
            return next.length > 30 ? next.slice(-30) : next;
        });
    }

    async function loadHosts() {
        const hosts = await api.get('/api/hosts');
        if (!hosts) return;

        const listEl = document.getElementById('hostHealthList');
        each(listEl, 'hosts', hosts, {
            sort: (a, b) => (b.alive - a.alive) || a.hostname.localeCompare(b.hostname),
        });

        const hostCount  = hosts.length;
        const routeCount = hosts.reduce((n, h) => n + (h.routes?.length || 0), 0);
        const hEl = document.getElementById('hero-hosts');
        const rEl = document.getElementById('hero-routes');
        if (hEl) hEl.textContent = hostCount;
        if (rEl) rEl.textContent = routeCount;
    }

    // Initial load
    await refresh();
    await loadHosts();

    // Poll — using component.interval() so it auto-clears on navigate
    component.interval(refresh, 3000);

    on('#refresh-dash', 'click', async () => {
        await refresh();
        await loadHosts();
        notify.success('Dashboard refreshed');
    });

    function _fmt(n) {
        if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
        return String(n || 0);
    }
</script>
