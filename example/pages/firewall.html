<!--
  pages/firewall.html
  Demonstrates: form.validate(), component.remove(), modal.confirm(),
                api.post/delete, each(), notify
-->
<div class="page" data-title="Firewall">
    <div class="page-header">
        <h1>Firewall Rules</h1>
        <button id="add-rule-btn" class="btn-primary">+ Block IP</button>
    </div>

    <!-- Add rule form — hidden by default -->
    <div id="addRuleForm" class="form-card" style="display:none">
        <form id="firewallForm">
            <div class="form-row">
                <div class="field">
                    <label>IP Address or CIDR</label>
                    <input name="ip" type="text" placeholder="192.168.1.1 or 10.0.0.0/24" required>
                    <span class="field-error" data-field="ip"></span>
                </div>
                <div class="field">
                    <label>Reason</label>
                    <input name="reason" type="text" placeholder="Brute force, Spam, etc." required>
                    <span class="field-error" data-field="reason"></span>
                </div>
            </div>
            <div class="form-row">
                <div class="field">
                    <label>Scope (optional)</label>
                    <input name="scope" type="text" placeholder="* or /admin or /api/v1">
                </div>
                <div class="field">
                    <label>Duration</label>
                    <label class="toggle-label">
                        <input name="permanent" type="checkbox" checked> Block permanently
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Block IP</button>
                <button type="button" id="cancel-rule-btn" class="btn">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Rules list -->
    <div id="firewallRules">
        <div data-loading="rules" class="loading-row">Loading rules...</div>

        <template data-each="rules" data-as="r">
            <div class="rule-row">
                <div class="rule-info" style="flex:1">
                    <strong class="rule-ip">{{r.ip}}</strong>
                    <span class="rule-reason muted">— {{r.reason}}</span>
                </div>
                <div class="rule-meta">
                    {{if .r.scope}}<span class="badge">{{r.scope}}</span>{{end}}
                    <span class="muted" style="font-size:11px;font-family:var(--mono)">{{r.created_at | date}}</span>
                    <span class="badge {{if .r.permanent}}badge-danger{{else}}badge-warn{{end}}">
                        {{if .r.permanent}}Permanent{{else}}Temporary{{end}}
                    </span>
                </div>
                <button class="btn-sm danger"
                        data-action="unblock"
                        data-ip="{{r.ip}}">Unblock</button>
            </div>
        </template>

        <div data-empty="rules" style="display:none" class="empty-state">
            <div class="empty-icon">✅</div>
            <p>No blocked IPs — all traffic is allowed</p>
        </div>
    </div>
</div>

<script type="module">
    import { each }      from '../../src/js/template.js';
    import { form }      from '../../src/js/form.js';
    import { notify }    from '../../src/js/notify.js';
    import { modal }     from '../../src/js/modal.js';
    import { component } from '../../src/js/component.js';
    import { on }        from '../../src/js/events.js';
    import { api }       from '../app.js';

    // All queries use container scope — no document.getElementById
    const rulesEl    = container.querySelector('#firewallRules');
    const formCardEl = container.querySelector('#addRuleForm');
    const addBtnEl   = container.querySelector('#add-rule-btn');

    async function loadRules() {
        const res   = await api.get('/api/firewall');
        const rules = res?.rules || [];
        each(rulesEl, 'rules', rules, {
            sort: (a, b) => new Date(b.created_at) - new Date(a.created_at),
        });
    }

    // Toggle form
    addBtnEl?.addEventListener('click', () => {
        formCardEl.style.display = '';
        addBtnEl.style.display   = 'none';
    });
    container.querySelector('#cancel-rule-btn')?.addEventListener('click', () => {
        formCardEl.style.display = 'none';
        addBtnEl.style.display   = '';
        form.reset('#firewallForm');
    });

    // Submit with validation
    form.on('#firewallForm', {
        submit: async (data) => {
            // form.validate() — uses our new declarative validation
            const ok = await form.validate('#firewallForm', {
                ip:     (v) => /^[\d.:/a-fA-F]+$/.test(v.trim()) || 'Enter a valid IP or CIDR',
                reason: (v) => v.trim().length >= 3 || 'Reason must be at least 3 characters',
            });
            if (!ok) throw new Error('Please fix the errors above');
            return api.post('/api/firewall', { ...data, scope: data.scope || '*' });
        },
        success: async (res) => {
            notify.success(`IP ${res.rule.ip} blocked`);
            form.reset('#firewallForm');
            formCardEl.style.display = 'none';
            addBtnEl.style.display   = '';
            await loadRules();
        },
        error: (err) => {
            if (err.message !== 'Please fix the errors above') {
                form.showError('#firewallForm', 'ip', err.message);
                notify.error(err.message);
            }
        }
    });

    // Unblock
    on('[data-action="unblock"]', 'click', async (e, el) => {
        const ip        = el.dataset.ip;
        const confirmed = await modal.confirm(`Unblock ${ip}?`);
        if (!confirmed) return;

        const res = await api.delete(`/api/firewall?ip=${encodeURIComponent(ip)}`);
        if (!res) { notify.error('Failed to unblock IP'); return; }

        const row = el.closest('[data-each-item="rules"]');
        if (row) await component.remove(row);
        notify.success(`${ip} unblocked`);
    });

    await loadRules();
</script>
